name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:setup
      - run: npm run lint -w apps/api
      - run: npm run format:check -w apps/api
      - run: npm run arch:check -w apps/api
      - run: npm run test -w apps/api
      - run: npm run test:integration -w apps/api
      - run: npm run build -w apps/api

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint -w apps/web
      - run: npm run format:check -w apps/web
      - run: npm run arch:check -w apps/web
      - run: npm run test -w apps/web
      - run: npm run build -w apps/web

  shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint -w packages/shared
      - run: npm run arch:check -w packages/shared
      - run: npm run format:check -w packages/shared
      - run: npm run test -w packages/shared
      - run: npm run build -w packages/shared

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:setup
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
